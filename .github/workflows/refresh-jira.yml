name: Refresh Jira Data
on:
  schedule:
    - cron: '0 20,22,0,2,4 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run fetch
        env:
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python3 fetch_incidencias_en_curso.py
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extracto-incidencias-en-curso.html incidencias_en_curso.json
          git diff --staged --quiet || (git commit -m "auto: refresh $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
